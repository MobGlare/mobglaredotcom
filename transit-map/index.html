<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transit Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="container">

        <div id="map"></div>

        <div id="search-bar">
            <input type="text" id="search-bar-mobile" placeholder="Search...">
        </div>
        <div id="search-results"></div>

        <div id="infobox-mobile">
            <div id="mobile-handle"></div>
            <div id="mobile-infocontent">
                <center><p>Select a line from the search bar.</p></center>
            </div>
        </div>

        <div id="infobox">
            <div id="deselect-line"><button>X</button></div>
            <div id="infobox-content"></div>
        </div>

        <div id="sidebar">

            <input
                id="search-desktop"
                type="text"
                placeholder="Search lines...">

            <div id="line-list"></div>

            <hr>

            <div id="station-list"></div>

        </div>

    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="script.js"></script>
</body>
</html>
