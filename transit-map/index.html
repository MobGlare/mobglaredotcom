<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transit Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>

    <div id="container">

        <div id="map"></div>

        <div id="search-bar">
            <input type="text" id="search-bar-mobile" placeholder="Search...">
            <button id="settings-mobile">⚙️</button>
        </div>
        <div id="search-results"></div>
        <div id="settings-results"></div>

        <div id="infobox-mobile">
            <div id="mobile-handle"></div>
            <div id="mobile-infocontent">
                <center><p>Select a line from the search bar.</p></center>
            </div>
        </div>

        <div id="infobox">
            <div id="deselect-line"><button>X</button></div>
            <div id="infobox-content">
                <p>Select a line to begin.</p>
            </div>
        </div>

        <div id="year-slider-container">
            <input id="year-label" type="number" min="1866" max="2026" value="2026">
            <input id="year-slider" type="range" min="1866" max="2026" value="2026">
        </div>

        <div id="sidebar">

            <input
                id="search-desktop"
                type="text"
                placeholder="Search lines...">

            <div id="line-list"></div>

            <hr>

            <div id="station-list"></div>

            <hr>

            <div id="settings">
                <h3>Map Settings</h3>

                <label class="switch-row">
                    <span>Network view</span>
                    <label class="switch">
                        <input type="checkbox" id="network-view-toggle">
                        <span class="slider"></span>
                    </label>
                </label>
                <label class="switch-row">
                    <span>Show Station Groups</span>
                    <label class="switch">
                        <input type="checkbox" id="station-groups-toggle">
                        <span class="slider"></span>
                    </label>
                </label>
                <label class="switch-row">
                    <span>Show All Stations</span>
                    <label class="switch">
                        <input type="checkbox" id="all-stations-toggle">
                        <span class="slider"></span>
                    </label>
                </label>
                <label class="switch-row">
                    <span>Ignore Year</span>
                    <label class="switch">
                        <input type="checkbox" id="year-toggle">
                        <span class="slider"></span>
                    </label>
                </label>
            </div>

        </div>

    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="script.js"></script>
</body>
</html>
